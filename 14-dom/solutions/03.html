<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Cat's Hat</title>
</head>

<body>
  <style>
    div {
      min-height: 200px;
      position: relative;
    }
  </style>
  <div>
    <img src="img/cat.png" class="opposite-cat" style="position: absolute">
    <img src="img/hat.png" class="opposite-hat" style="position: absolute">
  </div>
  <div>
    <img src="img/cat.png" class="around-cat" style="position: absolute">
    <img src="img/hat.png" class="around-hat" style="position: absolute">
  </div>

  <script>
    const catOpp = document.querySelector(".opposite-cat");
    const hatOpp = document.querySelector(".opposite-hat");
    const aroundCat = document.querySelector(".around-cat");
    const aroundHat = document.querySelector(".around-hat");
    const opposite = {catOpp, hatOpp};
    const around = {aroundCat, aroundHat}

    function callAnimations(oppositeElements, aroundElements) {
      let angle = 0;
      let lastTime = null;
      const {catOpp, hatOpp} = oppositeElements;
      const {aroundCat, aroundHat} = aroundElements;
      
      return function animate(time) {
        if (lastTime != null) angle += (time - lastTime) * 0.001;
        lastTime = time;
        animateOpposite({cat: catOpp, hat: hatOpp}, angle);
        animateAround({cat: aroundCat, hat: aroundHat}, angle);
        requestAnimationFrame(animate);
      }
    }

    function animateOpposite({cat, hat},angle) {
      cat.style.top = (Math.sin(angle) * 40 + 40) + "px";
      cat.style.left = (Math.cos(angle) * 200 + 230) + "px";

      hat.style.top = (Math.sin(angle) * 40 + 40) + "px";
      hat.style.left = (Math.cos(angle) * -200 + 230) + "px";
    }

    function animateAround({cat, hat},angle) {
      cat.style.top = (Math.sin(angle) * 40 + 40) + "px";
      cat.style.left = (Math.cos(angle) * 200 + 230) + "px";

      hat.style.top = (Math.sin(angle) * 120 + 60) + "px";
      hat.style.left = (Math.cos(angle) * 125 + 230) + "px";
    }

    requestAnimationFrame(callAnimations(opposite, around));
  </script>
</body>

</html>
